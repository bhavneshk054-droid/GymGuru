{% extends "base.html" %}

{% block title %}home{% endblock title %}

{% block body %}
<div class="container px-0">
    <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3" class="img-fluid" alt="Contact image" style="max-width: 100%; width: 1300px; height: 300px;">
 </div>
 <div class="container mb-3">   
    <h1 class="text-center">contact us</h1>
<form action="/contact/" method="post">
  {% csrf_token %}
<div class="form-group">
  <label for="name">name</label>
  <input type="text" class="form-control" id="name" name="name" placeholder="enter your name">
</div>

  <div class="form-group">
   <label for="phone">Phone</label>
    <input type='Phone' class="form-control" id="phone" name="phone" placeholder="enter your phone number">
   </div>

<div class="form-group">
  <label for="exampleFormControlInput1" class="form-label">Email address</label>
  <input type="email" class="form-control" id="exampleFormControlInput1" name="email" placeholder="name@example.com">
</div>

<div class="form-group">
  <label for="desc" class="form-label">Example textarea</label>
  <textarea class="form-control" id="desc" rows="3" name="desc"></textarea>
</div>

  <button type="submit" class="btn btn-primary my-3">Submit</button>
</form>
</div></div>
{% endblock body %}
